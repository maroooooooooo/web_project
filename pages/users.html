<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AdminFlow — Users</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><span class="logo-icon">⬡</span><span class="logo-text">AdminFlow</span></div>
    <nav class="sidebar-nav">
      <p class="nav-label">Main</p>
      <a href="../index.html" class="nav-item"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
      <a href="analytics.html" class="nav-item"><svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Analytics</a>
      <a href="users.html" class="nav-item active"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Users</a>
      <a href="orders.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>Orders</a>
      <p class="nav-label">Settings</p>
      <a href="settings.html" class="nav-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Settings</a>
      <a href="profile.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile</a>
    </nav>
    <div class="sidebar-footer">
      <img src="https://i.pravatar.cc/36?img=3" alt="avatar" class="avatar-sm"/>
      <div><p class="user-name">Alex Morgan</p><p class="user-role">Super Admin</p></div>
      <button class="logout-btn" onclick="window.location='login.html'"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></button>
    </div>
  </aside>

  <div class="main-wrapper">
    <header class="topbar">
      <button class="menu-toggle" id="menuToggle"><svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <div class="topbar-search">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="Search users…" id="userSearch"/>
      </div>
      <div class="topbar-actions">
        <div class="theme-toggle" id="themeToggle">☀️</div>
        <img src="https://i.pravatar.cc/36?img=3" alt="avatar" class="avatar-sm"/>
      </div>
    </header>

    <main class="content">
      <div class="page-header">
        <div><h1 class="page-title">Users</h1><p class="page-sub">Manage your user accounts</p></div>
        <button class="btn-primary" onclick="openAddModal()">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add User
        </button>
      </div>

      <div class="stat-row">
        <div class="stat-box"><h2>3,847</h2><p>Total Users</p></div>
        <div class="stat-box"><h2>2,104</h2><p>Active</p></div>
        <div class="stat-box"><h2>341</h2><p>New this month</p></div>
        <div class="stat-box"><h2>38</h2><p>Admins</p></div>
      </div>

      <div class="table-card" style="max-width:100%">
        <div class="card-header">
          <h3>All Users</h3>
          <select id="roleFilter" style="padding:6px 10px;border:1px solid var(--border);border-radius:7px;background:var(--bg);color:var(--text);font-family:inherit;font-size:.82rem;cursor:pointer;">
            <option value="">All roles</option>
            <option value="Admin">Admin</option>
            <option value="Editor">Editor</option>
            <option value="Viewer">Viewer</option>
          </select>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>User</th><th>Email</th><th>Role</th><th>Joined</th><th>Status</th><th>Actions</th></tr>
            </thead>
            <tbody id="usersBody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- Add User Modal -->
  <div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;align-items:center;justify-content:center;">
    <div style="background:var(--surface);border-radius:16px;padding:32px;width:440px;max-width:95vw;animation:fadeUp .3s ease;">
      <h3 style="font-family:'Playfair Display',serif;font-size:1.3rem;margin-bottom:20px;color:var(--text)">Add New User</h3>
      <div class="form-group"><label>Full Name</label><div class="input-wrap"><input type="text" id="newName" placeholder="Jane Doe"/></div></div>
      <div class="form-group"><label>Email</label><div class="input-wrap"><input type="email" id="newEmail" placeholder="jane@example.com"/></div></div>
      <div class="form-group"><label>Role</label>
        <select id="newRole" style="width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-family:inherit;font-size:.9rem;">
          <option>Viewer</option><option>Editor</option><option>Admin</option>
        </select>
      </div>
      <div style="display:flex;gap:10px;margin-top:24px;">
        <button class="btn-primary" onclick="addUser()" style="flex:1">Add User</button>
        <button onclick="closeModal()" style="flex:1;padding:10px;border:1px solid var(--border);border-radius:9px;background:none;cursor:pointer;font-family:inherit;color:var(--text);">Cancel</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="../js/dashboard.js"></script>
  <script>
    const USERS = [
      { name:'Sarah Kim',    email:'sarah@ex.com',   role:'Admin',  joined:'Jan 12, 2024', status:'active',   avatar:'https://i.pravatar.cc/32?img=5'  },
      { name:'James Oliver', email:'james@ex.com',   role:'Editor', joined:'Feb 3, 2024',  status:'active',   avatar:'https://i.pravatar.cc/32?img=8'  },
      { name:'Mia Roberts',  email:'mia@ex.com',     role:'Viewer', joined:'Mar 17, 2024', status:'inactive', avatar:'https://i.pravatar.cc/32?img=9'  },
      { name:'Leo Torres',   email:'leo@ex.com',     role:'Editor', joined:'Apr 1, 2024',  status:'active',   avatar:'https://i.pravatar.cc/32?img=12' },
      { name:'Ava Simmons',  email:'ava@ex.com',     role:'Viewer', joined:'Apr 22, 2024', status:'active',   avatar:'https://i.pravatar.cc/32?img=20' },
      { name:'Noah Patel',   email:'noah@ex.com',    role:'Admin',  joined:'May 5, 2024',  status:'inactive', avatar:'https://i.pravatar.cc/32?img=11' },
    ];

    function renderUsers(list = USERS) {
      const tbody = document.getElementById('usersBody');
      tbody.innerHTML = list.map((u,i) => `
        <tr>
          <td style="display:flex;align-items:center;gap:10px;">
            <img src="${u.avatar}" style="width:32px;height:32px;border-radius:50%;border:2px solid var(--border)"/>
            <strong>${u.name}</strong>
          </td>
          <td>${u.email}</td>
          <td><span class="status-badge" style="background:var(--primary-light);color:var(--primary)">${u.role}</span></td>
          <td>${u.joined}</td>
          <td><span class="status-badge ${u.status === 'active' ? 'status-completed' : 'status-cancelled'}">${u.status}</span></td>
          <td>
            <button onclick="showToast('Editing ${u.name}…')" style="background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;font-family:inherit;font-size:.78rem;color:var(--text)">Edit</button>
            <button onclick="deleteUser(${i})" style="background:none;border:1px solid #fecaca;border-radius:6px;padding:4px 10px;cursor:pointer;font-family:inherit;font-size:.78rem;color:#ef4444;margin-left:4px">Delete</button>
          </td>
        </tr>
      `).join('');
    }

    function deleteUser(i) { USERS.splice(i,1); renderUsers(); showToast('User removed.'); }

    function openAddModal() { document.getElementById('modal').style.display = 'flex'; }
    function closeModal()   { document.getElementById('modal').style.display = 'none'; }

    function addUser() {
      const name  = document.getElementById('newName').value.trim();
      const email = document.getElementById('newEmail').value.trim();
      const role  = document.getElementById('newRole').value;
      if (!name || !email) { showToast('Please fill in all fields.'); return; }
      USERS.unshift({ name, email, role, joined: 'Just now', status: 'active', avatar: `https://i.pravatar.cc/32?img=${Math.floor(Math.random()*70)}` });
      renderUsers(); closeModal(); showToast(`${name} added!`);
    }

    document.getElementById('userSearch').addEventListener('input', e => {
      const q = e.target.value.toLowerCase();
      renderUsers(USERS.filter(u => u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q)));
    });

    document.getElementById('roleFilter').addEventListener('change', e => {
      renderUsers(e.target.value ? USERS.filter(u => u.role === e.target.value) : USERS);
    });

    renderUsers();
  </script>
</body>
</html>
